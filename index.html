function DeityAnimation({ id, color, thumb }) {
  const w = thumb ? 48 : "100%";
  const h = thumb ? 48 : 260;
  const vb = thumb ? "0 0 48 48" : "0 0 400 260";
  const cx = thumb ? 24 : 200;
  const cy = thumb ? 24 : 130;
  const sc = thumb ? 0.18 : 1;

  const svgStyle = { display: "block", overflow: "visible" };

  if (id === "ganapati") return (
    <svg width={w} height={h} viewBox={vb} style={svgStyle} style={{ overflow: "visible" }}>
      <defs>
        <radialGradient id="gBg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#0A0A0F" stopOpacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx={cx} cy={cy} rx={thumb?22:180} ry={thumb?22:120} fill="url(#gBg)"/>
      {/* Rotating mala ring */}
      {[...Array(12)].map((_,i) => (
        <circle key={i} cx={cx} cy={cy} r={thumb?1.5:5} fill={color} opacity="0.7"
          style={{ transformOrigin:`${cx}px ${cy}px`, animation:`spin ${8+i*0.3}s linear infinite`,
            transform:`rotate(${i*30}deg) translateX(${thumb?14:90}px)` }}/>
      ))}
      {/* OM symbol */}
      <text x={cx} y={cy + (thumb?7:22)} textAnchor="middle"
        fontSize={thumb?20:80} fill={color} opacity="0.9" fontFamily="serif"
        style={{ animation:"pulse 3s ease-in-out infinite", transformOrigin:`${cx}px ${cy}px` }}>ॐ</text>
      {/* Tusk arc left */}
      {!thumb && <path d="M160,90 Q130,130 155,165" stroke={color} strokeWidth="4" fill="none" opacity="0.5" strokeLinecap="round"/>}
      {!thumb && <path d="M240,90 Q270,130 245,165" stroke={color} strokeWidth="4" fill="none" opacity="0.5" strokeLinecap="round"/>}
      {/* Glow particles */}
      {[...Array(thumb?0:6)].map((_,i) => (
        <circle key={i} cx={cx + Math.cos(i*60*Math.PI/180)*110} cy={cy + Math.sin(i*60*Math.PI/180)*60}

          cy={cy + Math.sin((a-90)*Math.PI/180)*70}

function PrayerView({ prayer, onBack, japaCount, setJapaCount, darkMode, theme, toggleDark }) {
  const topRef = useRef(null);
  const count = japaCount;
  const setCount = setJapaCount;
  useEffect(() => {
    topRef.current?.scrollIntoView({ behavior: "auto" });
  }, [prayer.id]);

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(180deg, ${prayer.color}22 0%, ${theme.bg} 400px)` }}>

      <div
        style={{
          background: `linear-gradient(135deg, ${prayer.color}22, ${prayer.color}08)`,
          borderBottom: `1px solid ${prayer.color}33`,
          padding: "20px 24px",
          position: "sticky",
          top: 0,
          zIndex: 10,
          backdropFilter: "blur(20px)",

              color: theme.textSecondary,
              fontSize: 14,
              cursor: "pointer",
              padding: 0,
              marginBottom: 8,
              fontFamily: "'EB Garamond', Georgia, serif",
              letterSpacing: "0.05em",

          >
            ← Back to all prayers
          </button>
          <button onClick={toggleDark} style={{
            background: "none", border: `1px solid ${theme.border}`,
            borderRadius: 20, padding: "6px 14px",
            cursor: "pointer", fontSize: 16,
            color: theme.textSecondary,
            fontFamily: "'EB Garamond', Georgia, serif",
            transition: "all 0.2s ease",
          }}>
            {darkMode ? "☀️" : "🌙"}

        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 28 }}>{prayer.icon}</span>

              style={{
                margin: 0,
                fontFamily: "'EB Garamond', Georgia, serif",
                fontSize: 22,
                color: theme.textPrimary,
                fontWeight: 500,
              }}

              {prayer.title}
            </h1>
            {prayer.subtitle && (
              <p
                style={{
                  margin: "4px 0 0",
                  fontSize: 12,
                  color: theme.textSecondary,
                  fontFamily: "'EB Garamond', Georgia, serif",
                  fontStyle: "italic",
                }}
              >
                {prayer.subtitle}
              </p>
            )}
          </div>
        </div>
      </div>

      {/* Deity Animation Hero */}
      <div style={{ position: "relative", width: "100%", height: 260, overflow: "hidden" }}>

        <div style={{
          position: "absolute", inset: 0,
          background: `linear-gradient(to bottom, transparent 50%, ${theme.bg} 100%)`,
          pointerEvents: "none",
        }} />
        <div style={{
          position: "absolute", bottom: 16, left: 24,
          fontFamily: "'EB Garamond', Georgia, serif",
          fontSize: 13,
          color: `${prayer.color}CC`,
          letterSpacing: "0.1em",
          textTransform: "uppercase",
          fontStyle: "italic",
        }}>
          {prayer.deity}
        </div>
      </div>

      {/* Note */}
      {prayer.note && (
        <div
          style={{
            margin: "16px 24px",
            padding: "12px 16px",
            background: `${prayer.color}11`,
            borderLeft: `3px solid ${prayer.color}66`,
            borderRadius: 4,
            fontSize: 13,
            color: theme.noteText,
            fontFamily: "'EB Garamond', Georgia, serif",
            lineHeight: 1.6,
          }}
        >
          {prayer.note}
        </div>
      )}

      {/* Counter Widget */}
      {prayer.hasCounter && (
        <div
          style={{
            margin: "20px 24px",
            padding: "24px",
            background: `${prayer.color}0D`,
            border: `1px solid ${prayer.color}30`,
            borderRadius: 12,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            gap: 12,
          }}
        >
          <div
            style={{
              fontFamily: "'EB Garamond', Georgia, serif",
              fontSize: 14,
              color: "#999",
              letterSpacing: "0.08em",
              textTransform: "uppercase",
            }}
          >
            Japa Count
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
            <button
              onClick={() => setCount((c) => Math.max(0, c - 1))}
              style={{
                width: 48,
                height: 48,
                borderRadius: "50%",
                border: `2px solid ${prayer.color}55`,
                background: `${prayer.color}1A`,
                color: "#F5F0E8",
                fontSize: 24,
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontFamily: "system-ui",
                transition: "all 0.15s ease",
              }}
            >
              −
            </button>
            <div
              style={{
                fontFamily: "'EB Garamond', Georgia, serif",
                fontSize: 56,
                fontWeight: 600,
                color: prayer.color,
                minWidth: 80,
                textAlign: "center",
                lineHeight: 1,
                textShadow: `0 0 40px ${prayer.color}33`,
              }}
            >
              {count}
            </div>
            <button
              onClick={() => setCount((c) => Math.min(prayer.counterMax ?? 9, c + 1))}
              style={{
                width: 48,
                height: 48,
                borderRadius: "50%",
                border: `2px solid ${prayer.color}55`,
                background: `${prayer.color}1A`,
                color: "#F5F0E8",
                fontSize: 24,
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontFamily: "system-ui",
                transition: "all 0.15s ease",
              }}
            >
              +
            </button>
          </div>
          <button
            onClick={() => setCount(0)}
            style={{
              background: `${prayer.color}15`,
              border: `1px solid ${prayer.color}33`,
              borderRadius: 6,
              color: theme.sectionHeadColor,
              fontSize: 12,
              cursor: "pointer",
              fontFamily: "'EB Garamond', Georgia, serif",
              letterSpacing: "0.05em",
              padding: "6px 16px",
              marginTop: 4,
            }}
          >
            Reset
          </button>
        </div>
      )}

      {/* Sections */}
      <div style={{ padding: "8px 24px 60px" }}>
        {prayer.sections.map((section, si) => (
          <div key={si} style={{ marginBottom: 32 }}>
            <h2
              style={{
                fontFamily: "'EB Garamond', Georgia, serif",
                fontSize: 16,
                color: prayer.color,
                fontWeight: 500,
                marginBottom: 12,
                paddingBottom: 6,
                borderBottom: `1px solid ${prayer.color}22`,
                letterSpacing: "0.03em",
                display: "flex",
                alignItems: "center",
                gap: 8,
              }}
            >
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: prayer.color, display: "inline-block", flexShrink: 0, boxShadow: `0 0 6px ${prayer.color}88` }} />
              {section.heading}
            </h2>
            <div
              style={{
                fontFamily: "'EB Garamond', Georgia, serif",
                fontSize: 17,
                lineHeight: 2,
                color: "#E8E0D0",
              }}
            >
              {section.lines.map((line, li) =>
                line === "" ? (
                  <div key={li} style={{ height: 12 }} />
                ) : (
                  <div
                    key={li}
                    style={{
                      padding: "2px 0",
                      letterSpacing: "0.02em",
                    }}
                  >
                    {line}
                  </div>
                )
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DailySadhanaBook() {
  const [selected, setSelected] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [unlocked, setUnlocked] = useState(false);
  const [pwd, setPwd] = useState("");
  const [pwdError, setPwdError] = useState(false);
  const [completed, setCompleted] = useState({});
  const [japaCounts, setJapaCounts] = useState({});
  const [darkMode, setDarkMode] = useState(true);
  const toggleDark = () => setDarkMode(d => !d);

  const theme = darkMode ? {
    bg: "#0A0A0F", card: "#151520", textPrimary: "#F5F0E8",
    textSecondary: "#999", textMuted: "#777", border: "#2a2a35",
    heroGrad: "radial-gradient(ellipse at 50% 0%, #1a1520 0%, #0A0A0F 70%)",
    inputBg: "#151520", searchBorder: "#2a2a35", searchColor: "#E8E0D0",
    footerColor: "#444", noteBg: "11", noteText: "#BBB",
    sectionHeadColor: "#888", lineColor: "#D4C5A9",
  } : {
    bg: "#F0EDE8", card: "#FFFFFF", textPrimary: "#1C1C1E",
    textSecondary: "#3C3C43", textMuted: "#6C6C70", border: "#C6C6C8",
    heroGrad: "radial-gradient(ellipse at 50% 0%, #E5E0D8 0%, #F0EDE8 70%)",
    inputBg: "#FFFFFF", searchBorder: "#C6C6C8", searchColor: "#1C1C1E",
    footerColor: "#8E8E93", noteBg: "18", noteText: "#3C3C43",
    sectionHeadColor: "#6C6C70", lineColor: "#1C1C1E",
  };

  const completedCount = Object.values(completed).filter(Boolean).length;

  const toggleCompleted = (e, prayer) => {
    e.stopPropagation();
    const max = prayer.counterMax ?? 9;
    if (prayer.hasCounter && (japaCounts[prayer.id] ?? 0) < max) return;
    setCompleted((prev) => ({ ...prev, [prayer.id]: !prev[prayer.id] }));
  };

  const handleUnlock = () => {
    if (pwd === "VISHNU") {
      setUnlocked(true);
      setPwdError(false);
    } else {
      setPwdError(true);
      setPwd("");
    }
  };

  const filtered = prayers.filter(
    (p) =>
      p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
      p.deity.toLowerCase().includes(searchTerm.toLowerCase())
  );

  if (!unlocked) {
    return (
      <div
        style={{
          minHeight: "100vh",
          background: "#0A0A0F",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          fontFamily: "'EB Garamond', Georgia, serif",
          padding: 24,
        }}
      >
        <link
          href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
          rel="stylesheet"
        />
        <div
          style={{
            fontSize: 56,
            marginBottom: 16,
            filter: "drop-shadow(0 0 30px rgba(218,165,32,0.3))",
          }}
        >
          🕉️
        </div>
        <h1
          style={{
            margin: 0,
            fontSize: 28,
            color: "#F5F0E8",
            fontWeight: 500,
            letterSpacing: "0.04em",
            marginBottom: 6,
          }}
        >
          Daily Sādhana
        </h1>
        <p
          style={{
            margin: "0 0 32px",
            fontSize: 14,
            color: "#666",
            fontStyle: "italic",
          }}
        >
          Enter the sacred word to proceed
        </p>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, width: "100%", maxWidth: 280 }}>
          <input
            type="password"
            placeholder="Password"
            value={pwd}
            onChange={(e) => { setPwd(e.target.value); setPwdError(false); }}
            onKeyDown={(e) => e.key === "Enter" && handleUnlock()}
            autoFocus
            style={{
              width: "100%",
              boxSizing: "border-box",
              padding: "14px 18px",
              background: "#151520",
              border: pwdError ? "1px solid #8B0000" : "1px solid #2a2a35",
              borderRadius: 10,
              color: "#F5F0E8",
              fontSize: 18,
              fontFamily: "'EB Garamond', Georgia, serif",
              textAlign: "center",
              letterSpacing: "0.15em",
              outline: "none",
            }}
          />
          {pwdError && (
            <p style={{ margin: 0, fontSize: 13, color: "#8B0000" }}>
              Incorrect. Try again.
            </p>
          )}
          <button
            onClick={handleUnlock}
            style={{
              width: "100%",
              padding: "12px",
              background: "linear-gradient(135deg, #DAA52033, #DAA52011)",
              border: "1px solid #DAA52044",
              borderRadius: 10,
              color: "#F5F0E8",
              fontSize: 16,
              fontFamily: "'EB Garamond', Georgia, serif",
              cursor: "pointer",
              letterSpacing: "0.06em",
            }}
          >
            Enter
          </button>
        </div>
        <p
          style={{
            marginTop: 48,
            fontSize: 12,
            color: "#333",
            fontStyle: "italic",
          }}
        >
          Om Śāntiḥ Śāntiḥ Śāntiḥ
        </p>
      </div>
    );
  }

  if (selected) {
    const prayer = prayers.find((p) => p.id === selected);
    return <PrayerView prayer={prayer} onBack={() => setSelected(null)} japaCount={japaCounts[prayer.id] ?? 0} setJapaCount={(fn) => setJapaCounts((prev) => ({ ...prev, [prayer.id]: typeof fn === "function" ? fn(prev[prayer.id] ?? 0) : fn }))} darkMode={darkMode} theme={theme} toggleDark={toggleDark} />;
  }

  return (
    <div
      style={{
        minHeight: "100vh",
        background: theme.bg,
        fontFamily: "'EB Garamond', Georgia, serif",
      }}
    >
      <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet"
      />

      {/* Hero */}
      <div
        style={{
          padding: "40px 24px 24px",
          textAlign: "center",
          background: theme.heroGrad,
          position: "relative",
        }}
      >
        <div
          style={{
            fontSize: 40,
            marginBottom: 8,
            filter: "drop-shadow(0 0 20px rgba(218,165,32,0.3))",
          }}
        >
          🕉️
        </div>
        <h1
          style={{
            margin: 0,
            fontSize: 28,
            color: theme.textPrimary,
            fontWeight: 500,
            letterSpacing: "0.04em",
          }}
        >
          Daily Sādhana
        </h1>
        <p
          style={{
            margin: "6px 0 0",
            fontSize: 14,
            color: theme.textMuted,
            fontStyle: "italic",
          }}
        >
          A complete chanting guide for daily practice
        </p>
        <button onClick={toggleDark} style={{
          position: "absolute", top: 20, right: 24,
          background: "none", border: `1px solid ${theme.border}`,
          borderRadius: 20, padding: "6px 14px",
          cursor: "pointer", fontSize: 16,
          color: theme.textSecondary,
          fontFamily: "'EB Garamond', Georgia, serif",
          transition: "all 0.2s ease",
        }}>
          {darkMode ? "☀️" : "🌙"}
        </button>
      </div>

      {/* Progress Bar */}
      <div style={{ padding: "0 24px 8px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color: theme.textMuted, marginBottom:4, fontFamily:"'EB Garamond', Georgia, serif" }}>
          <span>Today's Progress</span>
          <span>{completedCount} / {prayers.length}</span>
        </div>
        <div style={{ height:3, background: theme.border, borderRadius:2 }}>
          <div style={{ height:"100%", width:`${(completedCount/prayers.length)*100}%`, background: "#DAA520", borderRadius:2, transition:"width 0.4s ease" }}/>
        </div>
      </div>

      {/* Search */}
      <div style={{ padding: "8px 24px 16px" }}>
        <input
          type="text"
          placeholder="Search prayers..."
          value={searchTerm}
          onChange={(e) => setSearchTerm(e.target.value)}
          style={{
            width: "100%",
            boxSizing: "border-box",
            padding: "10px 14px",
            background: theme.inputBg,
            border: `1px solid ${theme.searchBorder}`,
            borderRadius: 8,
            color: theme.searchColor,
            fontSize: 15,
            fontFamily: "'EB Garamond', Georgia, serif",
            outline: "none",
          }}
        />
      </div>

      {/* Prayer Cards */}
      <div style={{ padding: "0 24px 40px" }}>
        {filtered.map((prayer, i) => (
          <button
            key={prayer.id}
            onClick={() => setSelected(prayer.id)}
            style={{
              display: "flex",
              alignItems: "center",
              gap: 14,
              width: "100%",
              padding: "16px",
              marginBottom: 8,
              background: `linear-gradient(135deg, ${prayer.color}0A, transparent)`,
              border: `1px solid ${completed[prayer.id] ? "#4CAF50" : prayer.color+"1A"}`,
              opacity: completed[prayer.id] ? 0.75 : 1,
              borderRadius: 10,
              cursor: "pointer",
              textAlign: "left",
              transition: "all 0.2s ease",
              position: "relative",
              overflow: "hidden",
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.background = `linear-gradient(135deg, ${prayer.color}18, ${prayer.color}08)`;
              e.currentTarget.style.borderColor = `${prayer.color}33`;
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.background = `linear-gradient(135deg, ${prayer.color}0A, transparent)`;
              e.currentTarget.style.borderColor = `${prayer.color}1A`;
            }}
          >
            <span style={{ width: 48, height: 48, borderRadius: 8, flexShrink: 0, overflow: "hidden", background: `${prayer.color}15`, display: "block" }}>
              <DeityAnimation id={prayer.id} color={prayer.color} thumb={true} />
            </span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div
                style={{
                  fontSize: 16,
                  fontFamily: "'EB Garamond', Georgia, serif",
                  color: theme.textPrimary,
                  fontWeight: 500,
                  marginBottom: 2,
                }}
              >
                {prayer.title}
              </div>
              <div
                style={{
                  fontSize: 12,
                  color: theme.textMuted,
                  fontFamily: "'EB Garamond', Georgia, serif",
                }}
              >
                {prayer.deity}
              </div>
            </div>
            <span style={{ color: "#555", fontSize: 18 }}>→</span>
            {(() => {
              const max = prayer.counterMax ?? 9;
              const japaReady = !prayer.hasCounter || (japaCounts[prayer.id] ?? 0) >= max;
              const isDone = !!completed[prayer.id];
              return (
                <span
                  onClick={(e) => toggleCompleted(e, prayer)}
                  title={!japaReady ? `Complete japa (${japaCounts[prayer.id] ?? 0}/${max}) first` : isDone ? "Mark incomplete" : "Mark complete"}
                  style={{
                    width: 26,
                    height: 26,
                    borderRadius: 6,
                    border: `2px solid ${isDone ? prayer.color : japaReady ? "#555" : "#333"}`,
                    background: isDone ? prayer.color : "transparent",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    flexShrink: 0,
                    cursor: japaReady ? "pointer" : "not-allowed",
                    opacity: japaReady ? 1 : 0.4,
                    transition: "all 0.2s ease",
                    fontSize: 14,
                    color: theme.bg,
                  }}
                >
                  {isDone ? "✓" : ""}
                </span>
              );
            })()}
          </button>
        ))}
      </div>

      {/* Footer */}
      <div
        style={{
          textAlign: "center",
          padding: "0 24px 32px",
          fontSize: 12,
          color: theme.footerColor,
          fontStyle: "italic",
        }}
      >
        Om Śāntiḥ Śāntiḥ Śāntiḥ
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<DailySadhanaBook />);
  </script>
</body>
</html>
